name: Build and Release EcoCycle EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        python -m PyInstaller --onefile --name "EcoCycle" --distpath ./dist ./SRC/consola.py
      shell: pwsh

    - name: Check if EXE was created
      run: |
        if (Test-Path "./dist/EcoCycle.exe") {
          Write-Host "✓ EXE creado exitosamente"
        } else {
          Write-Host "✗ Error: EXE no fue creado"
          exit 1
        }
      shell: pwsh

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: ./dist/consola.exe
        tag_name: v${{ github.run_number }}
        name: EcoCycle Build ${{ github.run_number }}
        body: |
          Actualización automática de la consola EcoCycle.
          Este ejecutable se conectará directamente a tu servidor en Render.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
